name: Publish Codex Runtime

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-codex-runtime.yml"
      - "docker/codex.Dockerfile"
      - "docker/codex-entrypoint.sh"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: multica-runtime-codex
  IMAGE_TAG: v0.3.6-codex-0.133.0-r2

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image coordinates
        id: image
        shell: bash
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner_lc}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/codex.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.image }}:${{ env.IMAGE_TAG }}
          labels: |
            org.opencontainers.image.title=Multica Codex Runtime
            org.opencontainers.image.description=Codex-first Multica daemon runtime image for Kubernetes-hosted agents
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
